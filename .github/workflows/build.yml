name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v2
      with:
        cmdline-tools: latest
    
    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties
    
    - name: Build APK
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon 2>&1 || gradle assembleDebug 2>&1 || echo "Trying with gradle wrapper"
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No APK generated"
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: DataLinkAnalyzer.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
